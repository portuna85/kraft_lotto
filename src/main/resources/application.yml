spring:
  application:
    name: lotto-generator
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: false

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/problem+json
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

# Logback 설정은 logback-spring.xml 에서 레벨별 파일/롤링까지 통합 관리
# 여기서는 출력 경로 변수만 노출(환경별 override 가능)
logging:
  file:
    path: logs

lotto:
  api:
    base-url: https://www.dhlottery.co.kr/common.do
    method: getLottoNumber
    connect-timeout: 3s
    read-timeout: 5s
    max-concurrent: 50
    retry:
      max-attempts: 3
      initial-interval: 200ms
      multiplier: 2.0
      max-interval: 2s
  draw:
    search-start: 1100
    search-step: 100
  generator:
    default-count: 5
    max-count: 50
    number-min: 1
    number-max: 45
    pick-size: 6
  ticket:
    price-per-game: 1000
    claim-validity-days: 365
