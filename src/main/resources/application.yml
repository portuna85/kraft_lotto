spring:
  application:
    name: lotto-generator
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: false

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/problem+json
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

# Logback 설정은 logback-spring.xml 에서 레벨별 파일/롤링까지 통합 관리
# 여기서는 출력 경로 변수만 노출(환경별 override 가능)
logging:
  file:
    path: logs

lotto:
  api:
    base-url: https://www.dhlottery.co.kr/common.do
    method: getLottoNumber
    connect-timeout: 3s
    read-timeout: 5s
    max-concurrent: 50
    retry:
      max-attempts: 3
      initial-interval: 200ms
      multiplier: 2.0
      max-interval: 2s
  draw:
    search-start: 1100
    search-step: 100
  generator:
    default-count: 5
    max-count: 50
    number-min: 1
    number-max: 45
    pick-size: 6
    # 고유 번호 생성 시도 안전 한도 배수 (count * safety-multiplier 회 시도 후 실패 처리)
    safety-multiplier: 1000
  ticket:
    price-per-game: 1000
    claim-validity-days: 365
  # Caffeine 캐시 외부화 — 운영 튜닝 시 재컴파일 없이 조정
  cache:
    # 추첨 결과: 한번 확정되면 영구 불변 → 7일 TTL
    lotto-draws:
      maximum-size: 2000
      expire-after-write: 7d
    # 최신 회차: 매주 토요일 갱신 → 30분 TTL
    latest-draw:
      maximum-size: 1
      expire-after-write: 30m
    # 역대 당첨번호 Set: latestDraw 키 — 회차 변경 시까지 유지
    history-winners:
      maximum-size: 8
      expire-after-write: 7d
